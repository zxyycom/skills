name: Package Skills

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    outputs:
      skill_hash: ${{ steps.skill_hash.outputs.current_hash }}
      recorded_skill_hash: ${{ steps.skill_hash.outputs.recorded_hash }}
      skill_hash_changed: ${{ steps.release_gate.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate and package
        run: bun run check

      - name: Check skill hash
        id: skill_hash
        run: bun scripts/hash-skills.ts --check --github-output

      - name: Read previous package hash
        id: previous_hash
        if: ${{ github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000' }}
        run: |
          set -euo pipefail

          if git cat-file -e "${{ github.event.before }}:skill-package.hash" 2>/dev/null; then
            hash="$(git show "${{ github.event.before }}:skill-package.hash" | tr -d '\r\n')"
            echo "hash=$hash" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect release hash change
        id: release_gate
        env:
          CURRENT_SKILL_HASH: ${{ steps.skill_hash.outputs.current_hash }}
          PREVIOUS_SKILL_HASH: ${{ steps.previous_hash.outputs.hash }}
        run: |
          set -euo pipefail

          changed=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            changed=true
          elif [ "$CURRENT_SKILL_HASH" != "${PREVIOUS_SKILL_HASH:-}" ]; then
            changed=true
          fi

          echo "Release hash changed: $changed"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Upload skill zips
        uses: actions/upload-artifact@v4
        with:
          name: skills
          path: dist/*.zip
          if-no-files-found: error

  publish:
    needs: package
    if: ${{ needs.package.outputs.skill_hash_changed == 'true' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          submodules: recursive

      - name: Download skill zips
        uses: actions/download-artifact@v4
        with:
          name: skills
          path: dist

      - name: Publish versioned and latest releases
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_HASH: ${{ needs.package.outputs.skill_hash }}
          RELEASE_PREFIX: skills
          LATEST_NAME: skills latest
          LATEST_TAG: skills-latest
        run: |
          set -euo pipefail
          package_hash_short="${PACKAGE_HASH:0:12}"
          version_tag="${RELEASE_PREFIX}-${package_hash_short}"
          version_name="${RELEASE_PREFIX} ${package_hash_short}"
          release_notes="Skill packages from $GITHUB_SHA.

Package hash: $PACKAGE_HASH"

          if ! git ls-remote --exit-code --tags origin "refs/tags/$version_tag" >/dev/null 2>&1; then
            git tag "$version_tag" "$GITHUB_SHA"
            git push origin "refs/tags/$version_tag"
          fi

          if gh release view "$version_tag" >/dev/null 2>&1; then
            gh release edit "$version_tag" \
              --title "$version_name" \
              --notes "$release_notes" \
              --latest
            gh release upload "$version_tag" dist/*.zip --clobber
          else
            gh release create "$version_tag" \
              dist/*.zip \
              --target "$GITHUB_SHA" \
              --title "$version_name" \
              --notes "$release_notes" \
              --latest
          fi

          git tag --force "$LATEST_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$LATEST_TAG"

          if gh release view "$LATEST_TAG" >/dev/null 2>&1; then
            gh release edit "$LATEST_TAG" \
              --target "$GITHUB_SHA" \
              --title "$LATEST_NAME" \
              --notes "$release_notes"
            gh release upload "$LATEST_TAG" dist/*.zip --clobber
          else
            gh release create "$LATEST_TAG" \
              dist/*.zip \
              --target "$GITHUB_SHA" \
              --title "$LATEST_NAME" \
              --notes "$release_notes" \
              --latest=false
          fi
