name: Package Skills

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    outputs:
      skill_hash: ${{ steps.skill_hash.outputs.current_hash }}
      recorded_skill_hash: ${{ steps.skill_hash.outputs.recorded_hash }}
      skill_hash_changed: ${{ steps.skill_hash.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate and package
        run: bun run check

      - name: Read previous published hash
        id: previous_hash
        if: ${{ github.event_name == 'push' && github.actor != 'github-actions[bot]' && github.event.before != '0000000000000000000000000000000000000000' }}
        run: |
          set -euo pipefail

          if git cat-file -e "${{ github.event.before }}:skill-package.hash" 2>/dev/null; then
            hash="$(git show "${{ github.event.before }}:skill-package.hash" | tr -d '\r\n')"
            echo "hash=$hash" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute skill hash
        id: skill_hash
        env:
          RECORDED_SKILL_HASH: ${{ steps.previous_hash.outputs.hash }}
        run: bun scripts/hash-skills.ts --github-output

      - name: Upload skill zips
        uses: actions/upload-artifact@v4
        with:
          name: skills
          path: dist/*.zip
          if-no-files-found: error

  publish:
    needs: package
    if: ${{ needs.package.outputs.skill_hash_changed == 'true' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          submodules: recursive

      - name: Download skill zips
        uses: actions/download-artifact@v4
        with:
          name: skills
          path: dist

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NAME: skills latest
          RELEASE_TAG: skills-latest
        run: |
          set -euo pipefail
          git tag --force "$RELEASE_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$RELEASE_TAG"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_NAME" \
              --notes "Latest skill packages from $GITHUB_SHA." \
              --latest
            gh release upload "$RELEASE_TAG" dist/*.zip --clobber
          else
            gh release create "$RELEASE_TAG" \
              dist/*.zip \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_NAME" \
              --notes "Latest skill packages from $GITHUB_SHA." \
              --latest
          fi

      - name: Record published skill hash
        env:
          SKILL_HASH: ${{ needs.package.outputs.skill_hash }}
        run: |
          set -euo pipefail
          printf '%s\n' "$SKILL_HASH" > skill-package.hash

          if git diff --quiet -- skill-package.hash; then
            echo "skill-package.hash already records $SKILL_HASH."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skill-package.hash
          git commit -m "chore: record published skill package hash"
          git push origin "HEAD:${GITHUB_REF_NAME}"
