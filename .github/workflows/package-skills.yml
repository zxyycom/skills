name: Package Skills

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    outputs:
      skill_hash: ${{ steps.skill_hash.outputs.current_hash }}
      skill_packages_changed: ${{ steps.release_gate.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate and package
        run: bun run check --strict

      - name: Calculate skill hash and check versions
        id: skill_hash
        env:
          BASELINE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail

          args=(--github-output)
          if [ -n "${BASELINE_REF:-}" ] && [ "$BASELINE_REF" != "0000000000000000000000000000000000000000" ]; then
            args+=(--baseline-ref "$BASELINE_REF")
          fi
          bun run hash:skills "${args[@]}"

      - name: Detect skill package changes
        id: release_gate
        env:
          BASELINE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail

          changed=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            changed=true
          elif [ -z "${BASELINE_REF:-}" ] || [ "$BASELINE_REF" = "0000000000000000000000000000000000000000" ]; then
            changed=true
          elif ! git diff --quiet "$BASELINE_REF" "$GITHUB_SHA" -- skills; then
            changed=true
          fi

          echo "Skill package content changed: $changed"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Upload skill assets
        uses: actions/upload-artifact@v4
        with:
          name: skills
          path: dist/*
          if-no-files-found: error

  publish:
    needs: package
    if: ${{ needs.package.outputs.skill_packages_changed == 'true' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Download skill assets
        uses: actions/download-artifact@v4
        with:
          name: skills
          path: dist

      - name: Publish versioned and latest releases
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_HASH: ${{ needs.package.outputs.skill_hash }}
          LATEST_NAME: skills latest
          LATEST_TAG: skills-latest
        run: |
          set -euo pipefail
          package_hash_short="${PACKAGE_HASH:0:12}"
          release_timestamp="$(date -u +'%Y%m%dT%H%M%SZ')"
          version_tag="${release_timestamp}-${package_hash_short}"
          version_name="${release_timestamp} ${package_hash_short}"
          release_notes="$(printf 'Skill packages from %s.\n\nPackage hash: %s' "$GITHUB_SHA" "$PACKAGE_HASH")"

          if ! git ls-remote --exit-code --tags origin "refs/tags/$version_tag" >/dev/null 2>&1; then
            git tag "$version_tag" "$GITHUB_SHA"
            git push origin "refs/tags/$version_tag"
          fi

          if gh release view "$version_tag" >/dev/null 2>&1; then
            gh release edit "$version_tag" \
              --title "$version_name" \
              --notes "$release_notes" \
              --latest
            gh release upload "$version_tag" dist/* --clobber
          else
            gh release create "$version_tag" \
              dist/* \
              --target "$GITHUB_SHA" \
              --title "$version_name" \
              --notes "$release_notes" \
              --latest
          fi

          git tag --force "$LATEST_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$LATEST_TAG"

          if gh release view "$LATEST_TAG" >/dev/null 2>&1; then
            gh release edit "$LATEST_TAG" \
              --target "$GITHUB_SHA" \
              --title "$LATEST_NAME" \
              --notes "$release_notes"

            existing_assets="$(gh release view "$LATEST_TAG" --json assets --jq '.assets[].name')"
            while IFS= read -r asset_name; do
              if [ -n "$asset_name" ]; then
                gh release delete-asset "$LATEST_TAG" "$asset_name" --yes
              fi
            done <<< "$existing_assets"

            gh release upload "$LATEST_TAG" dist/*
          else
            gh release create "$LATEST_TAG" \
              dist/* \
              --target "$GITHUB_SHA" \
              --title "$LATEST_NAME" \
              --notes "$release_notes" \
              --latest=false
          fi
