name: Package Skills

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate and package
        run: bun run check

      - name: Upload skill zips
        uses: actions/upload-artifact@v4
        with:
          name: skills
          path: dist/*.zip
          if-no-files-found: error

  publish:
    needs: package
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download skill zips
        uses: actions/download-artifact@v4
        with:
          name: skills
          path: dist

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NAME: skills latest
          RELEASE_TAG: skills-latest
        run: |
          set -euo pipefail
          git tag --force "$RELEASE_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$RELEASE_TAG"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_NAME" \
              --notes "Latest skill packages from $GITHUB_SHA." \
              --latest
            gh release upload "$RELEASE_TAG" dist/*.zip --clobber
          else
            gh release create "$RELEASE_TAG" \
              dist/*.zip \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_NAME" \
              --notes "Latest skill packages from $GITHUB_SHA." \
              --latest
          fi
